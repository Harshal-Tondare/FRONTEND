<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="/server">
        <input type="checkbox" id="age" name="age" checked>
        <!-- checked attribute to by default checked box -->
        <label for="age">I am 18+</label>

        <div>
            <input type="radio" name="fruit" id="apple" value="apple">
            <label for="apple">apple</label>
            <input type="radio" name="fruit" id="mango" value="mango">
            <label for="mango">mango</label>
            <input type="radio" name="fruit" id="banana" value="banana">
            <label for="banana">banana</label>
        </div>
        <br>
        <div>
            choose your subjects:
            <input type="checkbox" id="math" name="subject" value="Maths">
            <label for="math">Maths</label>
            <input type="checkbox" id="phy" name="subject" value="Physics">
            <label for="phy">Physics</label>
            <input type="checkbox" id="chem" name="subject" value="Chemistry">
            <label for="chem">Chemistry</label>
        </div>
        <br>
        <div>
        Choose your profession
            <select name="profession" id="profession">
            <option>select your Profession</option>
            <option value="student" selected>student</option>
            <option value="dev">developer</option>
            <button>submit</button>
            </select>
        </div> <br>

        <input type="range" id="vol" min="0" max="100" name="vol" step="10" value="70">
        <label for="vol">Select your volume level</label>
        <br>
        <label for="feedback">Please give your valuable feedback :</label>
        <textarea name="feedback" id="feedback" placeholder="Please write"></textarea>
        <button>submit</button>
    </form>
</body>
</html>
